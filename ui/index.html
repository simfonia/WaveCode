<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveCode IDE</title>
    <style>
        /* 強制確保 Blockly SVG 可見 */
        .blocklyWidgetDiv, .blocklyTooltipDiv { z-index: 1000; }
        .blocklySvg { background-color: #1e1e1e !important; width: 100%; height: 100%; display: block; }
        .blocklyMainBackground { fill: #1e1e1e !important; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>WaveCode IDE</h1>
            <div class="toolbar">
                <div id="run-btn" class="icon-btn" title="執行程式 (Run)">
                    <img src="/icons/run_blocks_24dp_75FB4C.png" alt="Run">
                </div>
                <div id="stop-btn" class="icon-btn" title="停止音訊 (Stop)">
                    <img src="/icons/no_sound_24dp_FE2F89.png" alt="Stop">
                </div>
            </div>
        </header>
        <main>
            <div id="blocklyDiv"></div>
            <div id="stage">
                <canvas id="waveformCanvas"></canvas>
            </div>
        </main>
    </div>
    
    <!-- 引入 Blockly (來自 public/lib) -->
    <script src="/lib/blockly_compressed.js"></script>
    <script src="/lib/blocks_compressed.js"></script>
    <script src="/lib/javascript_compressed.js"></script>
    <script src="/lib/zh-hant.js"></script>

    <!-- Vite 模組進入點 -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
